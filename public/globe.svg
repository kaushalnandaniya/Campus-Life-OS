<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Glowing aura / panic lines -->
  <circle cx="50" cy="50" r="48" fill="#fecaca" opacity="0.4" />
  <path d="M 50 2 L 50 8 M 50 92 L 50 98 M 2 50 L 8 50 M 92 50 L 98 50 M 16 16 L 22 22 M 84 84 L 78 78 M 16 84 L 22 78 M 84 16 L 78 22" stroke="#ef4444" stroke-width="3" stroke-linecap="round" />
  
  <!-- Base Globe -->
  <circle cx="50" cy="50" r="40" fill="#3b82f6" stroke="#1e3a8a" stroke-width="4" />
  
  <!-- Landmasses -->
  <path d="M 12 40 Q 25 15 50 15 T 70 25 Q 85 40 75 65 T 35 85 Q 15 70 12 40" fill="#22c55e" stroke="#14532d" stroke-width="2" />
  <path d="M 80 40 Q 90 50 85 70 Q 75 80 65 70 Q 60 50 80 40" fill="#22c55e" stroke="#14532d" stroke-width="2" />
  
  <!-- Panicked Wide Derp Eyes -->
  <circle cx="32" cy="42" r="14" fill="white" stroke="#0f172a" stroke-width="3" />
  <circle cx="68" cy="42" r="14" fill="white" stroke="#0f172a" stroke-width="3" />
  
  <!-- Bloodshot veins -->
  <path d="M 22 42 Q 25 38 28 40 M 20 46 Q 25 48 26 44 M 78 42 Q 75 38 72 40 M 80 46 Q 75 48 74 44" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-linecap="round" />
  
  <!-- Derp Pupils (different sizes and looking opposite ways) -->
  <circle cx="36" cy="40" r="4" fill="#0f172a" />
  <circle cx="62" cy="46" r="3" fill="#0f172a" />

  <!-- Huge Eye Bags -->
  <path d="M 20 58 Q 32 66 44 58" stroke="#475569" stroke-width="3" fill="none" stroke-linecap="round" />
  <path d="M 56 58 Q 68 66 80 58" stroke="#475569" stroke-width="3" fill="none" stroke-linecap="round" />
  
  <!-- Screaming / Wailing Mouth -->
  <path d="M 38 70 Q 50 65 62 70 L 62 80 Q 50 95 38 80 Z" fill="#7f1d1d" stroke="#0f172a" stroke-width="3" />
  <!-- Tongue -->
  <path d="M 42 78 Q 50 72 58 78 Q 50 90 42 78" fill="#f87171" />
  <!-- Top Teeth -->
  <path d="M 39 71 Q 50 67 61 71 L 61 74 Q 50 70 39 74 Z" fill="white" />
  
  <!-- Massive Sweat Drop -->
  <path d="M 85 15 Q 95 30 90 35 Q 83 40 80 30 Q 77 20 85 15" fill="#93c5fd" stroke="#1d4ed8" stroke-width="2" />
  <path d="M 83 22 L 85 30" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />

  <!-- Coffee cup (floating/taped) -->
  <g transform="translate(4, 55) rotate(-15)">
    <rect x="0" y="0" width="20" height="28" rx="2" fill="#f8fafc" stroke="#0f172a" stroke-width="2" />
    <rect x="0" y="8" width="20" height="10" fill="#8b5cf6" stroke="#0f172a" stroke-width="2" /> 
    <path d="M 20 10 Q 26 10 26 15 Q 26 20 20 20" stroke="#0f172a" stroke-width="2" fill="none" /> <!-- handle -->
    <path d="M 4 -10 Q 8 -5 4 0 M 14 -10 Q 18 -5 14 0" stroke="#cbd5e1" stroke-width="2" fill="none" stroke-linecap="round" /> <!-- steam -->
  </g>

  <!-- Missing Deadline Warning icon floating -->
  <g transform="translate(75, 65) rotate(20)">
    <path d="M 10 0 L 20 20 L 0 20 Z" fill="#eab308" stroke="#0f172a" stroke-width="2" />
    <text x="10" y="15" font-family="sans-serif" font-weight="bold" font-size="10" fill="#0f172a" text-anchor="middle">!</text>
  </g>

</svg>